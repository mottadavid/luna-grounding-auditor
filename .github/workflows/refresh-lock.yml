name: Refresh dependency lock

on:
  push:
    branches:
      - fix/security-dependencies
    paths:
      - package.json
      - .github/workflows/refresh-lock.yml

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/security-dependencies

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Verify no high or critical production vulnerabilities
        run: npm audit --omit=dev --audit-level=high

      - name: Commit lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(deps): refresh package lock"
          git push origin HEAD:fix/security-dependencies
