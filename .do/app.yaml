name: luna-grounding-auditor
region: nyc
services:
  - name: web
    github:
      repo: mottadavid/luna-grounding-auditor
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
